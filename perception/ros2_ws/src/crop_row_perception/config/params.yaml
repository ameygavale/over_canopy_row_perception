crop_row_fusion:
  ros__parameters:
    # Model weights
    yolov8_weights:  "/home/agavale2/over_canopy_row_perception/perception/checkpoints/yolov8/yolov8n_crop_row_v1.pt"
    yolov10_weights: ""   # not yet trained

    # Default growth stage for stub classifier
    default_stage: "corn_mid"

    # YOLO detection confidence threshold
    conf_threshold: 0.50   # raised from 0.25 to reduce over-detection

    # OAK-D Wide camera intrinsics (update after calibration)
    fx: 400.0
    fy: 400.0
    cx: 640.0
    cy: 360.0

    # ROS2 topic names
    rgb_topic:   "/oak/rgb/image_raw"
    depth_topic: "/oak/stereo/image_raw"
